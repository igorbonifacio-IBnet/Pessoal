name: Processar Mensagem WhatsApp

on:
  repository_dispatch:
    types: [whatsapp_message]

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências (opcional - Drive)
        run: pip install cryptography --quiet || true

      - name: Processar mensagem
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          EVOLUTION_API_URL:        ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_TOKEN:      ${{ secrets.EVOLUTION_API_TOKEN }}
          EVOLUTION_INSTANCE:       ${{ secrets.EVOLUTION_INSTANCE }}
          GOOGLE_CREDENTIALS:       ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID:   ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          WPP_MESSAGE:              ${{ github.event.client_payload.message }}
          WPP_FROM:                 ${{ github.event.client_payload.from }}
          WPP_MEDIA_URL:            ${{ github.event.client_payload.media_url }}
          WPP_MEDIA_MIME:           ${{ github.event.client_payload.media_mime }}
          WPP_TIMESTAMP:            ${{ github.event.client_payload.timestamp }}
        run: python process_whatsapp.py

      - name: Gerar dashboard
        run: python generate_dashboard.py

      - name: Commit e push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/wpp_transactions.json dashboard.html
          git diff --staged --quiet && echo "Nada a commitar" && exit 0
          git commit -m "💬 WhatsApp: ${{ github.event.client_payload.message_short }} [$(date -u '+%d/%m %H:%M')]"
          git push
